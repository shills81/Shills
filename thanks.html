<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're in — VEXA</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono&family=Syncopate:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--black:#050507;--smoke-white:#e8e4de;--gold:#c9a84c;}
html,body{height:100%;background:var(--black);color:var(--smoke-white);}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 24px;gap:24px;}
.eyebrow{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.32em;color:var(--gold);text-transform:uppercase;opacity:.9;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.6rem);font-weight:300;font-style:italic;line-height:1.2;color:var(--smoke-white);}
p{font-family:'Space Mono',monospace;font-size:.75rem;letter-spacing:.14em;color:rgba(232,228,222,.45);max-width:400px;line-height:1.9;text-transform:uppercase;}
a{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--smoke-white);opacity:.6;text-decoration:none;border-bottom:1px solid rgba(232,228,222,.2);padding-bottom:2px;transition:opacity .3s,border-color .3s;margin-top:8px;display:inline-block;}
a:hover{opacity:1;border-color:var(--gold);}
</style>
</head>
<body>
<span class="eyebrow">You're in</span>
<h1>We'll find you<br>when the doors open.</h1>
<p>Collector access, preview drops, and Lisbon debut details — coming to you first.</p>
<a href="/">Back to VEXA</a>
</body>
</html>
